name: Auto Post Reels to Facebook

on:
  schedule:
    # Chạy mỗi ngày lúc 12:00 trưa (GMT+7 = 05:00 UTC)
    # Tần suất: 1 lần/ngày để test, có thể tăng sau
    - cron: '0 5 * * *'
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions
    inputs:
      movie_slug:
        description: 'Nhập Link hoặc Slug phim muốn ép Bot đăng (Bỏ trống nếu muốn Bot tự tìm)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  post-reels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install Node dependencies
        run: npm install axios form-data composio-core

      - name: Run Reels Poster Script
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MANUAL_MOVIE_SLUG: ${{ github.event.inputs.movie_slug }}
        run: node auto-post-fb-reels.js

      - name: Commit & push posted-reels.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted-reels.json
          git diff --staged --quiet || git commit -m "chore: update posted-reels.json [$(date +'%Y-%m-%d')]"
          git push
