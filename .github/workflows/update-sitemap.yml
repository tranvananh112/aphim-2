name: Auto Update Image Sitemap

on:
  schedule:
    - cron: '17 2 * * *'   # Chạy mỗi ngày lúc 2:17 AM UTC (9:17 AM giờ VN) - Đổi sang phút lẻ để tránh nghẽn server Github
  workflow_dispatch:       # Cho phép chạy thủ công từ GitHub Actions tab

# ✅ Fix exit code 128: Cấp quyền write để bot có thể push sitemap lên repo
permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # ✅ Nâng lên Node.js 24 (Node 20 bị xóa sau 2/6/2026)

      - name: Install dependencies
        run: npm install axios

      - name: Generate sitemap-images.xml
        run: node generate-sitemap.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap-images.xml
          git diff --staged --quiet || git commit -m "chore: auto-update sitemap-images.xml [$(date +'%Y-%m-%d')]"
          git push
