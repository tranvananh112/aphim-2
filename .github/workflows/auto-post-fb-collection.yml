name: Auto Post Trending Collection to Facebook

on:
  schedule:
    # Chạy mỗi ngày lúc 12:00 trưa (GMT+7 = 05:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

permissions:
  contents: write

jobs:
  post-collection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios jimp@0.16.13 composio-core form-data

      - name: Run Trending Collection Post Script
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: node auto-post-fb-collection.js

      - name: Commit & push posted-collections.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted-collections.json
          git diff --staged --quiet || git commit -m "chore: update posted-collections.json [$(date +'%Y-%m-%d')]"
          git push
